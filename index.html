<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Siriraj CPR AR - Pitching Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; overflow: hidden; }
      
      #instruction {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85); color: #fff; padding: 12px 20px;
        border-radius: 25px; text-align: center; z-index: 9999; width: 80%; max-width: 350px; font-size: 14px;
      }

      #pin-btn {
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        z-index: 9999; padding: 16px 35px; background: #00E676; color: black;
        font-weight: bold; font-size: 16px; border: none; border-radius: 30px;
        box-shadow: 0 5px 15px rgba(0,230,118,0.4); cursor: pointer;
      }

      #control-panel {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        z-index: 9999; display: none; flex-direction: column; width: 90%; max-width: 360px;
      }

      .btn {
        padding: 14px; margin: 6px 0; background: #00796B; color: white;
        border: none; border-radius: 30px; font-size: 15px; font-weight: bold;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      }
      #cprBtn { background: #D32F2F; }
    </style>
  </head>
  
  <body>

    <div id="instruction">หันกล้องไปที่พื้น/โต๊ะ แล้วกดปุ่มปักหมุดสีเขียวได้เลย</div>
    
    <button id="pin-btn" onclick="pinToWorld()">📍 ปักหมุดวางร่างผู้ป่วย</button>
    
    <div id="control-panel">
      <button class="btn" onclick="alert('✔️ พื้นที่ปลอดภัย ไม่มีสิ่งกีดขวางรอบตัวผู้ป่วย')">1. ตรวจความปลอดภัย</button>
      <button class="btn" onclick="alert('📢 ตบไหล่เรียกแรงๆ: คุณๆ เป็นยังไงบ้าง!')">2. ตบไหล่เรียกผู้ป่วย</button>
      <button class="btn" onclick="alert('📞 โทร 1669 และขอเครื่อง AED ด่วน!')">3. โทร 1669 / ขอ AED</button>
      <button class="btn" id="cprBtn" onclick="toggleCPRAnimation()">4. เริ่มปั๊มหัวใจ (110 BPM)</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-entity camera>
        <a-entity id="patient-holder" position="0 -0.5 -1.2" rotation="20 0 0">
          
          <a-entity id="patient-body">
            <a-box position="0 0.1 0" width="0.4" height="0.2" depth="0.6" material="color: #2980b9;"></a-box>
            <a-box position="0 0.1 0.5" width="0.38" height="0.18" depth="0.4" material="color: #7f8c8d;"></a-box>
            <a-sphere position="0 0.1 -0.45" radius="0.12" material="color: #f39c12;"></a-sphere>
            
            <a-cylinder id="cpr-target" position="0 0.21 -0.05" radius="0.1" height="0.02" material="color: #c0392b;"
                        animation="property: scale; to: 1 0.2 1; dir: alternate; dur: 272; loop: true; startEvents: startBeat; pauseEvents: stopBeat">
            </a-cylinder>
            <a-text value="PUSH HERE" position="0 0.24 -0.05" rotation="-90 0 0" align="center" color="#FFFFFF" scale="0.35 0.35 0.35"></a-text>
          </a-entity>

        </a-entity>
      </a-entity>

      <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
    </a-scene>

    <script>
      let isCprActive = false;

      // ฟังก์ชันปลดล็อกหุ่นให้อยู่กับพิกัดโลก ไม่ลอยตามกล้องอีกต่อไป
      function pinToWorld() {
        const holder = document.querySelector('#patient-holder');
        const scene = document.querySelector('a-scene');
        const patientBody = document.querySelector('#patient-body');
        
        // ดึงพิกัดตำแหน่งและมุมหมุนล่าสุดที่ลอยอยู่กลางจอ
        const worldPos = new THREE.Vector3();
        patientBody.object3D.getWorldPosition(worldPos);
        
        // ย้ายตัวหุ่นออกจากกล้อง มาแปะไว้ที่ตัวฉากหลังโลกแทน
        scene.object3D.add(patientBody.object3D);
        patientBody.object3D.position.copy(worldPos);
        patientBody.object3D.rotation.set(0, 0, 0); // วางราบกับพื้นโลก
        
        // สลับ UI
        document.querySelector('#pin-btn').style.display = 'none';
        document.querySelector('#instruction').style.display = 'none';
        document.querySelector('#control-panel').style.display = 'flex';
      }

      function toggleCPRAnimation() {
        const cprTarget = document.querySelector('#cpr-target');
        const cprBtn = document.querySelector('#cprBtn');
        if (!isCprActive) {
          cprTarget.emit('startBeat');
          cprBtn.innerHTML = "หยุดปั๊มหัวใจ";
          cprBtn.style.background = "#555555";
          isCprActive = true;
        } else {
          cprTarget.emit('stopBeat');
          cprTarget.setAttribute('scale', '1 1 1');
          cprBtn.innerHTML = "4. เริ่มปั๊มหัวใจ (110 BPM)";
          cprBtn.style.background = "#D32F2F";
          isCprActive = false;
        }
      }
    </script>
  </body>
</html>

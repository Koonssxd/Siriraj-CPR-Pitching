<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>LifeBeat AR CPR — Hands Free</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Noto+Sans+Thai:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0E12; --panel:#10161E; --panel2:#0C1117;
  --red:#FF2D55; --red-dim:#7A1830;
  --vital:#00E5A0; --amber:#FFB000;
  --ink:#EAF1F6; --muted:#64788A; --line:rgba(120,150,170,.14);
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
  --thai:'Noto Sans Thai',system-ui,sans-serif;
  --disp:'Archivo','Noto Sans Thai',system-ui,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:var(--thai);color:var(--ink);
  -webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
#vid{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
#cv{position:fixed;inset:0;width:100%;height:100%}
#ui{position:fixed;inset:0;pointer-events:none}

.brk{position:absolute;width:20px;height:20px;opacity:0;transition:opacity .4s;pointer-events:none}
.brk.show{opacity:.5}
#bk-tl{top:12px;left:12px;border-top:1.5px solid var(--vital);border-left:1.5px solid var(--vital)}
#bk-tr{top:12px;right:12px;border-top:1.5px solid var(--vital);border-right:1.5px solid var(--vital)}
#bk-bl{bottom:12px;left:12px;border-bottom:1.5px solid var(--vital);border-left:1.5px solid var(--vital)}
#bk-br{bottom:12px;right:12px;border-bottom:1.5px solid var(--vital);border-right:1.5px solid var(--vital)}

/* HUD — monitor readout style */
#hud-t{position:absolute;top:0;left:0;right:0;
  padding:max(env(safe-area-inset-top),12px) 14px 12px;
  background:linear-gradient(rgba(10,14,18,.82),transparent);
  display:none;justify-content:space-between;align-items:flex-start}
.st{text-align:center;min-width:54px}
.st .sv{font-family:var(--mono);font-size:21px;font-weight:700;line-height:1;
  font-variant-numeric:tabular-nums}
.st .sl{font-family:var(--mono);font-size:8px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.hud-grp{display:flex;gap:14px}

#scene-tag{position:absolute;top:max(env(safe-area-inset-top),14px);left:50%;
  transform:translateX(-50%);font-family:var(--mono);font-size:10px;letter-spacing:3px;
  opacity:0;text-transform:uppercase;color:var(--ink);
  display:flex;align-items:center;gap:7px;pointer-events:none;transition:opacity .5s;white-space:nowrap}
#scene-tag::before{content:'';width:6px;height:6px;border-radius:50%;
  background:var(--red);box-shadow:0 0 8px var(--red);animation:blip 1.4s infinite}
@keyframes blip{0%,100%{opacity:1}50%{opacity:.25}}
#scene-tag.show{opacity:.9}

#dots{position:absolute;top:max(env(safe-area-inset-top),44px);left:50%;
  transform:translateX(-50%);display:none;gap:5px}
.dot{width:18px;height:3px;border-radius:0;background:rgba(120,150,170,.25);transition:background .3s}
.dot.on{background:var(--red)}.dot.ok{background:var(--vital)}

#msg{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 22px);
  left:0;right:0;text-align:center;padding:0 22px;display:none}
#fb{font-family:var(--disp);font-size:27px;font-weight:900;letter-spacing:1px;
  min-height:33px;margin-bottom:5px;text-shadow:0 2px 12px rgba(0,0,0,.9)}
#ins{font-size:14px;line-height:1.55;font-weight:700;
  text-shadow:0 1px 8px rgba(0,0,0,.95)}
#sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:5px;
  letter-spacing:.3px;text-shadow:0 1px 6px rgba(0,0,0,.95)}

#posture{position:absolute;top:max(env(safe-area-inset-top),70px);left:50%;
  transform:translateX(-50%);font-size:12px;font-weight:700;
  background:rgba(10,14,18,.72);border-radius:2px;padding:6px 14px;
  display:none;border:1px solid var(--amber);border-left-width:3px;
  color:var(--amber);white-space:nowrap;backdrop-filter:blur(4px)}
#posture.good{border-color:var(--vital);color:var(--vital)}

/* PANELS — instrument console */
.panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(340px,90vw);background:var(--panel);
  border:1px solid var(--line);border-radius:4px;
  box-shadow:0 24px 70px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);
  pointer-events:auto;overflow:hidden}
.panel-pad{padding:26px 22px}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:transparent;border:1px solid var(--line);
  color:var(--ink);font-size:13px;font-weight:700;letter-spacing:.5px;
  padding:13px 18px;cursor:pointer;border-radius:3px;
  font-family:var(--thai);margin-top:9px;transition:all .16s}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff;
  box-shadow:0 0 0 0 rgba(255,45,85,.5)}
.btn-primary:active{background:#E5264C}
.btn-vital{border-color:var(--vital);color:var(--vital)}
.btn-ghost{border-color:var(--line);color:var(--muted)}
.btn.r{border-color:var(--line);color:var(--muted)}

@keyframes sc{from{top:-2px}to{top:100vh}}
#scanline{position:fixed;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,229,160,.25),transparent);
  animation:sc 3.5s linear infinite;pointer-events:none;display:none}

/* flip button */
#flip-btn{font-family:var(--mono)}

/* mode selector buttons */
.modebtn{flex:1;background:var(--panel2);border:1px solid var(--line);
  color:var(--muted);border-radius:3px;padding:11px 3px 9px;cursor:pointer;
  font-family:var(--thai);display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all .16s;font-size:18px}
.modebtn span{font-size:11px;font-weight:700;color:var(--ink);line-height:1}
.modebtn i{font-family:var(--mono);font-size:8px;font-style:normal;
  letter-spacing:.5px;color:var(--muted);opacity:.8}
.modebtn.sel{border-color:var(--red);background:rgba(255,45,85,.08)}
.modebtn.sel span{color:var(--red)}

/* ECG hero animation: dash sweeps across */
#ecg-path{stroke-dasharray:340;stroke-dashoffset:340;
  animation:ecgsweep 2.4s linear infinite}
@keyframes ecgsweep{to{stroke-dashoffset:0}}
@media(prefers-reduced-motion:reduce){
  #ecg-path{animation:none;stroke-dashoffset:0}
  #scene-tag::before{animation:none}
}
</style>
</head>
<body>
<video id="vid" autoplay playsinline muted></video>
<canvas id="cv"></canvas>
<div id="scanline"></div>
<button id="flip-btn" style="position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 70px);
  right:14px;z-index:50;background:rgba(16,22,30,.8);border:1px solid var(--line);
  color:var(--ink);border-radius:3px;width:44px;height:44px;font-size:18px;cursor:pointer;
  display:none;pointer-events:auto;backdrop-filter:blur(6px)">⟳</button>
<div id="ui">
  <div class="brk" id="bk-tl"></div><div class="brk" id="bk-tr"></div>
  <div class="brk" id="bk-bl"></div><div class="brk" id="bk-br"></div>
  <div id="scene-tag">LIFEBEAT AR</div>
  <div id="dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div id="posture">🤲 ประสานมือสองข้าง!</div>
  <div id="hud-t">
    <div class="hud-grp">
      <div class="st"><div class="sv" id="n-c" style="color:var(--red)">0</div><div class="sl">Compressions</div></div>
      <div class="st"><div class="sv" id="n-b" style="color:var(--vital)">--</div><div class="sl">BPM</div></div>
    </div>
    <div class="st"><div class="sv" id="n-s" style="color:var(--amber)">0</div><div class="sl">Score</div></div>
  </div>
  <div id="msg"><div id="fb"></div><div id="ins"></div><div id="sub"></div></div>

  <div class="panel" id="p-start">
    <!-- ECG hero header -->
    <div style="position:relative;background:var(--panel2);padding:22px 22px 16px;
      border-bottom:1px solid var(--line);overflow:hidden">
      <svg id="ecg-hero" viewBox="0 0 320 56" preserveAspectRatio="none"
        style="position:absolute;inset:0;width:100%;height:100%;opacity:.5">
        <path id="ecg-path" d="M0,28 L80,28 L92,28 L100,10 L108,46 L116,28 L150,28 L320,28"
          fill="none" stroke="var(--red)" stroke-width="1.6"/>
      </svg>
      <div style="position:relative">
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:3px;
          color:var(--muted);text-transform:uppercase;margin-bottom:6px">Emergency Response Trainer</div>
        <div style="font-family:var(--disp);font-size:30px;font-weight:900;letter-spacing:-.5px;line-height:1">
          LIFE<span style="color:var(--red)">BEAT</span>
          <span style="font-size:14px;font-weight:600;color:var(--muted);letter-spacing:1px">/ AR</span>
        </div>
      </div>
    </div>
    <div class="panel-pad">
      <!-- the one stat that matters -->
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:18px;
        padding-bottom:16px;border-bottom:1px solid var(--line)">
        <div style="font-family:var(--disp);font-size:40px;font-weight:900;color:var(--red);line-height:.9">60</div>
        <div style="text-align:left">
          <div style="font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase">วินาที</div>
          <div style="font-size:13px;font-weight:700;line-height:1.3">ชี้เป็นชี้ตาย<br>ฝึกให้พร้อมก่อนถึงเวลาจริง</div>
        </div>
      </div>

      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);
        text-transform:uppercase;margin-bottom:9px">เลือกโหมดฝึก</div>
      <div style="display:flex;gap:6px;margin-bottom:18px">
        <button id="mode-stand" class="modebtn">📱<span>ถือมือถือ</span><i>ใช้ง่าย</i></button>
        <button id="mode-body" class="modebtn">🧍<span>ทั้งตัว</span><i>สมจริงสุด</i></button>
      </div>

      <button class="btn btn-vital" id="btn-learn">เรียนรู้ก่อนเริ่ม</button>
      <button class="btn btn-primary" id="btn-ar">เริ่มภารกิจช่วยชีวิต</button>
      <button class="btn btn-ghost" id="btn-demo">ลองด้วยเมาส์ (Demo)</button>
    </div>
  </div>

  <!-- LESSON PANEL -->
  <div class="panel" id="p-learn" style="display:none;width:min(360px,92vw)">
    <div style="background:var(--panel2);padding:16px 20px 13px;
      border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase">บทเรียน · Protocol</span>
        <span id="lesson-count" style="font-family:var(--mono);font-size:11px;color:var(--vital)">1/6</span>
      </div>
      <div id="lesson-bar-w" style="height:2px;background:var(--line);margin-top:10px">
        <div id="lesson-bar" style="height:100%;width:16%;background:var(--red);transition:width .3s"></div>
      </div>
    </div>
    <div style="padding:22px 20px;text-align:center;min-height:286px;display:flex;flex-direction:column">
      <div id="lesson-emoji" style="font-size:42px;margin-bottom:12px">❤️</div>
      <div id="lesson-title" style="font-family:var(--disp);font-size:19px;font-weight:900;color:var(--red);margin-bottom:11px"></div>
      <div id="lesson-body" style="font-size:13.5px;line-height:1.85;color:var(--ink);opacity:.92;text-align:left;flex:1"></div>
      <div id="lesson-quiz" style="display:none;margin-top:12px"></div>
    </div>
    <div style="display:flex;gap:8px;padding:0 16px 16px">
      <button class="btn btn-ghost" id="lesson-prev" style="flex:1;margin:0">ย้อน</button>
      <button class="btn btn-primary" id="lesson-next" style="flex:2;margin:0">ถัดไป</button>
    </div>
  </div>

  <div class="panel" id="p-res" style="display:none"><div id="res"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
  crossorigin="anonymous" onerror="window._mf=1"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"
  crossorigin="anonymous" onerror="window._mpf=1"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
  crossorigin="anonymous" onerror="window._mcf=1"></script>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const TOTAL=30, PERSP=0.46, DWELL_MS=1100;
const PUMP_MIN=13, WAVE_NEED=3;
const FLOOR_BETA_MIN=65, FLOOR_BETA_MAX=145;  // device tilt = pointing at floor
const STEADY_MAX=2.5, SCAN_NEED=1500;
const CLASP_DIST_F=0.16;

// ── Ground projection model (pinhole camera) ──
const CAM_H = 1.35;   // camera height above floor (m)
const ANCH_D = 1.9;   // patient distance in front of camera (m)
const VFOV  = 62;     // vertical field of view (deg)

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let phase='init', demo=false, sc=0;
let matStart=null, matScale=0, anchored=false;
let anchorA=null;          // yaw reference at placement
let anchorBeta=null;       // pitch reference at placement
let lockBaseX=null,lockBaseY=null;  // screen point where patient was locked
let beta=null,gamma=null,alpha=null,prevBeta=null,prevGamma=null,moveRate=99;
let scanAccum=0,lastScanT=0,sensorOK=false;
let distF=1;               // distance scale factor (recomputed per frame)

let lms=[],h1=null,h2=null,demoX=null,demoY=null,clasped=false;
let isFront=false;         // true if using front (selfie) camera → mirror
let dwellTarget=null,dwellStart=0,dwellProg=0;
let waveDir=0,waveCount=0,lastWX=null;
let compr=0,cbpm=0,bwin=[];
let pumpState='up',pumpRefY=null,pumpExtreme=null,lastPumpT=0,cprDepth=0;
let kneelMode=false;       // true = phone laid flat, kneeling beside patient
let bodyMode=false;        // true = full-body pose mode (MediaPipe Pose)
let cprMode='stand';       // 'stand' | 'kneel' | 'body'
let strokeDepth=0;         // 0..1 how deep the current stroke went (for depth meter)
let lastStrokeQ=0;         // quality of last completed stroke depth (0..1)
let cA=0,inChest=false;
let aedPlaced=new Set(),aedArmed=false;
let callSeq=['1','6','6','9'],callIdx=0,callZones=null;
let aCtx=null;

// ═══════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════
const vid=$('vid'),cv=$('cv'),G=cv.getContext('2d');
const fbEl=$('fb'),insEl=$('ins'),subEl=$('sub'),postureEl=$('posture');
function $(x){return document.getElementById(x);}
function resize(){cv.width=innerWidth;cv.height=innerHeight;}
resize();addEventListener('resize',resize);
function setMsg(i,s=''){insEl.textContent=i;subEl.textContent=s;}
function setFb(t,c){fbEl.textContent=t;fbEl.style.color=c;
  clearTimeout(fbEl._t);fbEl._t=setTimeout(()=>fbEl.textContent='',800);}
function setTag(t){const e=$('scene-tag');e.textContent=t;e.className='show';}
function setDots(i){[0,1,2,3].forEach(k=>$('d'+k).className='dot'+(k<i?' ok':k===i?' on':''));
  $('dots').style.display='flex';}
function updHUD(){$('n-s').textContent=sc;$('n-c').textContent=compr;
  $('n-b').textContent=cbpm||'--';}

// ═══════════════════════════════════════════════════════
// GROUND PROJECTION — แกนหลักของ AR anchoring
// ผู้ป่วยถูกตรึงไว้ที่จุดบนพื้น ห่างกล้อง ANCH_D เมตร
// ทุกเฟรมคำนวณว่าจุดนั้นอยู่ตรงไหนบนจอ จากมุม gyro จริง
// ═══════════════════════════════════════════════════════
function focalPx(){ return (cv.height/2)/Math.tan(VFOV*Math.PI/360); }

// Raw target position from the locked spot + camera-angle delta since lock.
// Patient stays where it was placed and only shifts by how much the camera moved.
function rawX(){
  if(lockBaseX==null) return cv.width*.5;
  if(!sensorOK||alpha==null||anchorA==null) return lockBaseX;
  let d=((alpha-anchorA+540)%360)-180;        // yaw change since lock (deg)
  return lockBaseX - d*(focalPx()*Math.PI/180);
}
function rawY(){
  if(lockBaseY==null) return cv.height*.55;
  if(!sensorOK||beta==null||anchorBeta==null) return lockBaseY;
  const dPitch=(beta-anchorBeta)*Math.PI/180;  // pitch change since lock (rad)
  return lockBaseY + Math.tan(dPitch)*focalPx();
}
// Smoothed accessors — exponential moving average kills gyro jitter
function aX(){
  if(!anchored) return cv.width*.5;
  const tgt=rawX();
  smX = smX==null ? tgt : smX + (tgt-smX)*0.18;
  return smX;
}
function aY(){
  if(!anchored) return cv.height*.55;
  const tgt=rawY();
  smY = smY==null ? tgt : smY + (tgt-smY)*0.18;
  return smY;
}
function updDistF(){
  // steeper down-tilt (looking closer to feet) = patient appears bigger
  if(!sensorOK||beta==null){distF=1;return;}
  const pitchDown=(Math.max(70,Math.min(170,beta))-90)*Math.PI/180;
  distF=0.7+0.6*Math.min(1.2,Math.max(.2,pitchDown));
}
function patientOnScreen(){
  const y=aY(),m=getB()*1.8;
  return y>-m && y<cv.height+m;
}

// ═══════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════
$('btn-ar').onclick=()=>{requestSensors();startAR();};
$('btn-demo').onclick=()=>{demo=true;beginScan();};
$('btn-learn').onclick=()=>openLesson();

// CPR mode toggle
$('mode-stand').onclick=()=>setMode('stand');
$('mode-body').onclick=()=>setMode('body');
function setMode(m){
  cprMode=m;
  kneelMode=false;
  bodyMode=(m==='body');
  ['stand','body'].forEach(k=>{
    $('mode-'+k).classList.toggle('sel',k===m);
  });
}
setMode('stand');

// ═══════════════════════════════════════════════════════
// LEARN MODE — บทเรียนภาษาไทย ก่อนลงมือจริง
// ═══════════════════════════════════════════════════════
const LESSONS=[
  {emoji:'❤️', title:'CPR คืออะไร?',
   body:'CPR (การปั๊มหัวใจผายปอดกู้ชีพ) คือการช่วยชีวิตเมื่อมีคน<b>หัวใจหยุดเต้น</b> หรือ<b>หมดสติไม่หายใจ</b><br><br>เมื่อหัวใจหยุด เลือดจะไม่ไปเลี้ยงสมอง ทุกๆ 1 นาทีที่ผ่านไปโดยไม่ได้ช่วย โอกาสรอดลดลง <b>7-10%</b><br><br>การปั๊มหัวใจคือการ "บีบหัวใจแทน" เพื่อส่งเลือดไปเลี้ยงสมองจนกว่าทีมแพทย์จะมาถึง'},
  {emoji:'🔍', title:'ขั้นที่ 1 — ประเมินความปลอดภัย',
   body:'ก่อนเข้าไปช่วย ต้อง<b>ดูรอบๆ ว่าปลอดภัยไหม</b><br><br>• มีสายไฟ ไฟไหม้ รถ หรืออันตรายอื่นหรือไม่?<br>• ถ้าไม่ปลอดภัย อย่าเพิ่งเข้าไป<br><br>จากนั้น<b>เขย่าไหล่</b>ผู้ป่วยเบาๆ พร้อมเรียกดังๆ ว่า<br>"คุณ! คุณ! ได้ยินไหม?"<br><br>ถ้าไม่ตอบสนอง = ต้องช่วยทันที'},

let lessonIdx=0, quizAnswered=false;

function openLesson(){
  $('p-start').style.display='none';
  $('p-learn').style.display='block';
  lessonIdx=0;
  showLesson();
}

function showLesson(){
  const L=LESSONS[lessonIdx];
  quizAnswered=false;
  $('lesson-emoji').textContent=L.emoji;
  $('lesson-title').innerHTML=L.title;
  $('lesson-body').innerHTML=L.body;
  $('lesson-count').textContent=`${lessonIdx+1}/${LESSONS.length}`;
  $('lesson-bar').style.width=((lessonIdx+1)/LESSONS.length*100)+'%';
  $('lesson-prev').style.visibility=lessonIdx===0?'hidden':'visible';

  // quiz on last lesson
  const qz=$('lesson-quiz');
  if(L.quiz){
    qz.style.display='block';
    qz.innerHTML=`<div style="font-family:var(--mono);font-size:11px;font-weight:700;margin-bottom:9px;color:var(--amber);letter-spacing:.5px">❓ ${L.quiz.q}</div>`;
    L.quiz.opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='btn btn-ghost';b.style.cssText='margin:5px 0;font-size:12.5px;padding:10px;color:var(--ink)';
      b.textContent=o;
      b.onclick=()=>{
        if(quizAnswered)return;
        if(i===L.quiz.ans){
          b.style.borderColor='var(--vital)';b.style.color='var(--vital)';
          b.textContent='✓ '+o;
          quizAnswered=true;beep(900,80);
        } else {
          b.style.borderColor='var(--red)';b.style.color='var(--red)';beep(200,150);
        }
      };
      qz.appendChild(b);
    });
    $('lesson-next').textContent='เริ่มภารกิจจริง';
  } else {
    qz.style.display='none';
    $('lesson-next').textContent=lessonIdx===LESSONS.length-1?'เริ่มภารกิจจริง':'ถัดไป';

$('lesson-prev').onclick=()=>{ if(lessonIdx>0){lessonIdx--;showLesson();} };
$('lesson-next').onclick=()=>{
  if(lessonIdx<LESSONS.length-1){ lessonIdx++;showLesson(); }
  else { $('p-learn').style.display='none'; requestSensors(); startAR(); }
};

function requestSensors(){
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(r=>{if(r==='granted')attachOrient();}).catch(()=>{});
  } else attachOrient();
}
function attachOrient(){
  addEventListener('deviceorientation',e=>{
    if(e.beta==null)return;
    sensorOK=true;
    prevBeta=beta;prevGamma=gamma;
    beta=e.beta;gamma=e.gamma;alpha=e.alpha;
    if(prevBeta!=null)
      moveRate=Math.abs(beta-prevBeta)+Math.abs((gamma||0)-(prevGamma||0));
  },{passive:true});
}

let curFacing='environment', camStream=null, mpStarted=false;

async function startAR(){
  $('p-start').style.display='none';
  await openCamera('environment');
  $('flip-btn').style.display='block';
  beginScan();
}

async function openCamera(facing){
  try{
    if(camStream){ camStream.getTracks().forEach(t=>t.stop()); }
    const s=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:720}}});
    camStream=s; curFacing=facing;
    vid.srcObject=s;
    const settings=(s.getVideoTracks()[0]||{}).getSettings?.()||{};
    isFront = settings.facingMode==='user' || facing==='user';
    applyMirror();
    await new Promise(r=>vid.onloadedmetadata=r);
    vid.play();
    if(!mpStarted){ initMP(); mpStarted=true; }
  }catch(e){ demo=true; }
}

$('flip-btn').onclick=()=>{
  openCamera(curFacing==='environment'?'user':'environment');
};

function applyMirror(){
  // mirror only the video feed (เหมือนส่องกระจก); canvas stays unmirrored
  // so text/UI is readable. Hand X coords get flipped in JS instead.
  vid.style.transform = isFront ? 'scaleX(-1)' : 'none';
}

let poseLms=null;          // full-body pose landmarks
let poseWristY=null;        // averaged wrist Y for pump detection in body mode

function initMP(){
  if(bodyMode) return initPose();
  if(window._mf||typeof Hands==='undefined')return;
  try{
    const h=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    h.setOptions({maxNumHands:2,modelComplexity:0,
      minDetectionConfidence:.5,minTrackingConfidence:.5});
    h.onResults(r=>{
      lms=r.multiHandLandmarks||[];
      if(isFront){
        for(const lm of lms) for(const pt of lm) pt.x=1-pt.x;
      }
      h1=null;h2=null;
      if(lms[0]){const lm=lms[0];
        h1={x:(lm[0].x+lm[9].x)/2*cv.width,y:(lm[0].y+lm[9].y)/2*cv.height};}
      if(lms[1]){const lm=lms[1];
        h2={x:(lm[0].x+lm[9].x)/2*cv.width,y:(lm[0].y+lm[9].y)/2*cv.height};}
      if(h1&&h2){
        const d=Math.hypot(h1.x-h2.x,h1.y-h2.y);
        clasped=d<Math.min(cv.width,cv.height)*CLASP_DIST_F;
      } else if(h1&&!h2){
        clasped=true;
      } else clasped=false;
    });
    if(window._mcf||typeof Camera==='undefined')return;
    new Camera(vid,{onFrame:async()=>{try{await h.send({image:vid});}catch(_){}}
      ,width:640,height:480}).start();
  }catch(e){}
}

// ── MediaPipe Pose for full-body mode ──
function initPose(){
  if(window._mpf||typeof Pose==='undefined'){ bodyMode=false; return initMP(); }
  try{
    const ps=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    ps.setOptions({modelComplexity:0,smoothLandmarks:true,
      minDetectionConfidence:.5,minTrackingConfidence:.5});
    ps.onResults(r=>{
      poseLms=r.poseLandmarks||null;
      if(poseLms){
        if(isFront) for(const pt of poseLms) pt.x=1-pt.x;
        // wrists: 15=left, 16=right ; visibility check
        const lw=poseLms[15], rw=poseLms[16];
        const sx=poseLms[11], dx2=poseLms[12]; // shoulders
        // hands together (CPR) if both wrists close
        let wy=[], wxs=[];
        if(lw&&lw.visibility>.3){wy.push(lw.y);wxs.push(lw.x);}
        if(rw&&rw.visibility>.3){wy.push(rw.y);wxs.push(rw.x);}
        if(wy.length){
          poseWristY=wy.reduce((a,c)=>a+c,0)/wy.length*cv.height;
          const mxw=wxs.reduce((a,c)=>a+c,0)/wxs.length*cv.width;
          h1={x:mxw,y:poseWristY};
          // clasp = wrists near each other (or only one visible)
          if(wxs.length===2){
            const dWrist=Math.hypot((lw.x-rw.x)*cv.width,(lw.y-rw.y)*cv.height);
            clasped=dWrist<Math.min(cv.width,cv.height)*0.22;
          } else clasped=true;
        } else { h1=null; poseWristY=null; clasped=false; }
        h2=null;
      } else { h1=null;h2=null;poseWristY=null;clasped=false; }
    });
    if(window._mcf||typeof Camera==='undefined')return;
    new Camera(vid,{onFrame:async()=>{try{await ps.send({image:vid});}catch(_){}}
      ,width:640,height:480}).start();
  }catch(e){ bodyMode=false; }
}

addEventListener('pointermove',e=>{demoX=e.clientX;demoY=e.clientY;},{passive:true});
addEventListener('pointerdown',e=>{demoX=e.clientX;demoY=e.clientY;
  if(demo&&phase==='cpr')registerCompression();
  if(phase==='pickspot') tapPickSpot(e.clientX,e.clientY);
},{passive:true});

function tapPickSpot(x,y){
  // find nearest dot within range
  let best=null,bd=1e9;
  for(const d of floorDots){
    const dist=Math.hypot(x-d.x,y-d.y);
    if(dist<bd){bd=dist;best=d;}
  }
  if(best && bd<70) placeAt(best.x,best.y);
}

function ptr(){
  if(h1&&h2&&clasped)return{x:(h1.x+h2.x)/2,y:(h1.y+h2.y)/2,real:true};
  if(h1)return{x:h1.x,y:h1.y,real:true};
  if(demo&&demoX!=null)return{x:demoX,y:demoY,real:false};
  return null;
}

// ═══════════════════════════════════════════════════════
// SCAN — gyro จริง: เอียงลงพื้น + นิ่ง
// ═══════════════════════════════════════════════════════
function beginScan(){
  $('scanline').style.display='block';
  document.querySelectorAll('.brk').forEach(el=>el.classList.add('show'));
  $('msg').style.display='block';
  // Full-body mode: no gyro floor scan. Set up the camera-prop placement.
  if(bodyMode){
    phase='bodysetup'; bodySetupStart=Date.now();
    setMsg('🧍 วางมือถือพิงให้เห็นตัวเต็ม แล้วถอยไปคุกเข่า','ระบบกำลังมองหาตัวคุณ…');
    resize();loop();
    return;
  }
  phase='scan';scanAccum=0;lastScanT=Date.now();
  setMsg('📐 เอียงกล้องชี้ลงพื้น','ระบบใช้ Gyroscope ตรวจมุมจริง');
  resize();loop();
}

let bodySetupStart=null;
function bodySetupLogic(){
  // wait until pose is detected (user visible), then place patient horizontally
  if(poseLms || demo || (Date.now()-bodySetupStart>6000)){
    anchored=true;
    pX=cv.width*.5; pY=cv.height*.5;
    matStart=Date.now(); matScale=0;
    phase='mat';
    beep(820,130);
    if(navigator.vibrate)navigator.vibrate([25,50,25]);
    setMsg('👤 ผู้ป่วยนอนขวางหน้าคุณ','คุกเข่าข้างผู้ป่วย พร้อมเริ่มช่วยชีวิต');
  } else {
    setMsg('🧍 ถอยให้เห็นตัวเต็มในกล้อง','ระบบกำลังมองหาตัวคุณ…');
  }
}

function scanLogic(){
  const now=Date.now(),dt=now-lastScanT;lastScanT=now;
  let okAngle=false,steady=false;
  if(demo||!sensorOK){
    okAngle=true;steady=true;
    if(!sensorOK&&!demo)setMsg('📐 ชี้กล้องลงพื้น','(ไม่พบ Gyroscope — โหมดสำรอง)');
  } else {
    okAngle=beta>=FLOOR_BETA_MIN&&beta<=FLOOR_BETA_MAX;
    steady=moveRate<STEADY_MAX;
    if(!okAngle)
      setMsg(beta<FLOOR_BETA_MIN?'📐 เอียงกล้องลงอีก — ชี้ลงพื้น':'📐 ยกกล้องขึ้นนิดนึง',
        `มุมเครื่อง: ${Math.round(beta)}° (ต้องการ ${FLOOR_BETA_MIN}–${FLOOR_BETA_MAX}°)`);
    else if(!steady)setMsg('✋ ถือนิ่งๆ','กำลังสแกนหาพื้น…');
    else setMsg('🔍 กำลังสแกนพื้น…','ถือค้างไว้สักครู่');
  }
  if(okAngle&&steady)scanAccum+=dt;
  else scanAccum=Math.max(0,scanAccum-dt*1.5);
  if(scanAccum>=SCAN_NEED)finishScan();
}

function finishScan(){
  // scan confirmed a usable floor → show candidate dots to pick from
  phase='pickspot';
  genFloorDots();
  beep(880,90);
  if(navigator.vibrate)navigator.vibrate(30);
  setMsg('👆 แตะจุดบนพื้นเพื่อวางผู้ป่วย','เลือกจุดที่พื้นโล่ง');
}

// candidate floor anchor points (in screen space, projected along the ground)
let floorDots=[], lockedSpot=null;
function genFloorDots(){
  floorDots=[];
  const w=cv.width,h=cv.height;
  // lay a small perspective grid of candidate points on the lower/centre area
  const rows=[0.50,0.62,0.74], colsByRow=[3,4,5];
  rows.forEach((ry,ri)=>{
    const n=colsByRow[ri], y=h*ry;
    for(let i=0;i<n;i++){
      const t=(i+0.5)/n;
      const spread=0.34+ri*0.12;       // wider as it comes closer
      const x=w*(0.5+(t-0.5)*spread*2);
      floorDots.push({x,y,bx:x,by:y,seed:Math.random()*6.28});
    }
  });
}

// smoothing state for the locked anchor
let smX=null, smY=null;
function placeAt(x,y){
  lockedSpot={x,y};
  // lock anchor at the tapped screen point; record gyro reference for drift comp
  anchored=true;
  anchorA=alpha;
  anchorBeta=beta;
  lockBaseX=x; lockBaseY=y;
  smX=x; smY=y;
  pX=x; pY=y;
  matStart=Date.now();matScale=0;
  phase='mat';
  beep(820,130);
  if(navigator.vibrate)navigator.vibrate([25,50,25]);
  setMsg('👤 พบผู้ป่วยหมดสติ!','ผู้ป่วยถูกตรึงกับพื้นแล้ว');
}

function afterMat(){
  phase='safety0';waveCount=0;lastWX=null;
  $('hud-t').style.display='flex';
  setTag('SCENE 1 — ประเมินสถานการณ์');setDots(0);
  setMsg('🔍 มองรอบๆ แล้วค้างมือบนปุ่ม "ปลอดภัย"','ค้างมือเหนือปุ่ม 1.1 วิ = เลือก');
}

// ═══════════════════════════════════════════════════════
// AIR HOVER
// ═══════════════════════════════════════════════════════
function updateDwell(zones){
  const p=ptr();
  if(!p){dwellTarget=null;dwellProg=0;return null;}
  let over=null;
  for(const z of zones){if(Math.hypot(p.x-z.x,p.y-z.y)<z.r){over=z;break;}}
  if(!over){dwellTarget=null;dwellProg=0;return null;}
  if(dwellTarget!==over.id){dwellTarget=over.id;dwellStart=Date.now();}
  dwellProg=Math.min(1,(Date.now()-dwellStart)/DWELL_MS);
  if(dwellProg>=1){
    dwellTarget=null;dwellProg=0;beep(900,80);
    if(navigator.vibrate)navigator.vibrate(35);
    return over.id;
  }
  return null;
}

function drawHoverBtn(z,color='#00E5A0',icon=''){
  const p=(Math.sin(Date.now()/450)+1)*.5;
  const active=dwellTarget===z.id;
  G.beginPath();G.arc(z.x,z.y,z.r,0,Math.PI*2);
  G.fillStyle=active?'rgba(0,255,136,.16)':hexA(color,.10);G.fill();
  G.strokeStyle=active?'#00FF88':hexA(color,.55+p*.3);G.lineWidth=2;G.stroke();
  if(active&&dwellProg>0){
    G.beginPath();
    G.arc(z.x,z.y,z.r+6,-Math.PI/2,-Math.PI/2+dwellProg*Math.PI*2);
    G.strokeStyle='#00FF88';G.lineWidth=4;G.lineCap='round';G.stroke();G.lineCap='butt';
  }
  G.textAlign='center';
  if(icon){G.font=`${Math.round(z.r*.6)}px system-ui`;G.textBaseline='middle';
    G.fillStyle='#fff';G.fillText(icon,z.x,z.y-(z.label?6:0));}
  if(z.label){G.font='bold 11px system-ui';G.textBaseline='top';
    G.fillStyle=active?'#00FF88':'#fff';G.fillText(z.label,z.x,z.y+z.r*.3);}
  G.textBaseline='alphabetic';
}
function hexA(hx,a){const r=parseInt(hx.slice(1,3),16),g=parseInt(hx.slice(3,5),16),
  b=parseInt(hx.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

// ═══════════════════════════════════════════════════════
// SCENES
// ═══════════════════════════════════════════════════════
function sceneLogic(w,h){
  const B=getB(),AXX=aX(),AYY=aY();

  if(phase==='safety0'){
    const z={id:'safe',x:AXX,y:Math.max(80,AYY-B*1.45*PERSP-90),r:46,label:'ปลอดภัย'};
    drawHoverBtn(z,'#00E5A0','🔍');
    if(updateDwell([z])==='safe'){
      sc+=25;updHUD();setFb('+25','#00E5A0');
      phase='safety1';waveCount=0;lastWX=null;
      setMsg('🤚 เอามือวางบนไหล่ผู้ป่วย แล้วเขย่า','วางมือในกรอบไหล่ แล้วขยับมือไปมา');
    }
  }
  else if(phase==='safety1'){
    const p=ptr();
    // shoulder zone (upper body, near head end)
    const zcx=AXX, zcy=AYY-B*1.05*PERSP;
    const zw=B*1.0, zh=B*.55*PERSP*matScale + B*.2;
    const zx=zcx-zw/2, zy=zcy-zh/2;
    const pu=(Math.sin(Date.now()/350)+1)*.5;
    const handIn = p && p.x>zx && p.x<zx+zw && p.y>zy && p.y<zy+zh;
    // draw shoulder target zone
    G.strokeStyle=handIn?`rgba(0,255,136,${.6+pu*.3})`:`rgba(255,179,0,${.4+pu*.35})`;
    G.lineWidth=2.2;G.setLineDash([10,6]);
    G.strokeRect(zx,zy,zw,zh);G.setLineDash([]);
    if(handIn){
      G.fillStyle=`rgba(0,255,136,.1)`;G.fillRect(zx,zy,zw,zh);
    }
    G.fillStyle=handIn?'#00FF88':'#FFB300';
    G.font='bold 13px system-ui';G.textAlign='center';
    G.fillText(handIn?`เขย่า! ${waveCount}/${WAVE_NEED}`:'🤚 วางมือบนไหล่',zcx,zy-12);

    if(handIn){
      if(lastWX!=null){
        const dx=p.x-lastWX;
        if(Math.abs(dx)>6){
          const dir=Math.sign(dx);
          if(dir!==waveDir&&waveDir!==0){
            waveCount++;beep(560+waveCount*70,50);
            if(navigator.vibrate)navigator.vibrate(20);
          }
          waveDir=dir;
        }
      }
      lastWX=p.x;
    } else { lastWX=null; }

    if(waveCount>=WAVE_NEED){
      sc+=25;updHUD();setFb('ไม่ตอบสนอง!','#FF2D55');
      phase='safety2';
      setMsg('🚨 ผู้ป่วยไม่ตอบสนอง ไม่หายใจ!','ค้างมือบนปุ่มโทร 1669');
    }
  }
  else if(phase==='safety2'){
    const z={id:'call',x:AXX,y:Math.max(80,AYY-B*1.45*PERSP-90),r:46,label:'โทร 1669'};
    drawHoverBtn(z,'#FF2D55','📞');
    if(updateDwell([z])==='call'){sc+=25;updHUD();startCall();}
  }
  else if(phase==='call'){drawCallScene(w,h);}
  else if(phase==='cpr'){cprMotion(w,h);}
  else if(phase==='aed'){drawAEDScene(w,h);}
  else if(phase==='shock'){
    drawAEDScene(w,h);  // keep showing torso with placed pads
    const T=aedTorso(w,h);
    const z={id:'shock',x:w*.5,y:Math.min(h-120,T.cy+T.th*.62),r:52,label:'SHOCK!'};
    drawHoverBtn(z,'#FF2D55','⚡');
    if(updateDwell([z])==='shock'){
      sc+=70;updHUD();beep(200,400);
      if(navigator.vibrate)navigator.vibrate([50,80,50,80,50]);
      setFb('⚡ SHOCK!','#FFB300');
      setMsg('ส่งกระแสไฟฟ้าสำเร็จ!','');
      phase='done';setTimeout(showResult,1500);
    }
  }
}

function startCall(){
  phase='call';callIdx=0;
  setTag('SCENE 2 — โทร 1669');setDots(1);
  setMsg('📞 ค้างมือบนตัวเลขตามลำดับ 1 → 6 → 6 → 9','');
  const w=cv.width,h=cv.height;
  const labels=['1','6','9','4','3'];
  const cxs=[.2,.5,.8,.32,.68],cys=[.3,.22,.3,.45,.45];
  callZones=[];
  for(let i=0;i<5;i++)
    callZones.push({id:'n'+i,num:labels[i],x:w*cxs[i],y:h*cys[i],r:38});
}

function drawCallScene(w,h){
  G.font='bold 30px monospace';G.textAlign='center';G.fillStyle='#00E5A0';
  let d='';for(let i=0;i<4;i++)d+=i<callIdx?callSeq[i]:'_';
  G.fillText(d.split('').join(' '),w*.5,h*.14);
  const need=callSeq[callIdx];
  for(const z of callZones){
    const isNext=z.num===need;
    drawHoverBtn(z,isNext?'#00FF88':'#445566');
    G.font='bold 26px monospace';G.textAlign='center';G.textBaseline='middle';
    G.fillStyle=isNext?'#00FF88':'rgba(255,255,255,.4)';
    G.fillText(z.num,z.x,z.y);G.textBaseline='alphabetic';
  }
  const hit=updateDwell(callZones);
  if(hit){
    const z=callZones.find(c=>c.id===hit);
    if(z.num===need){
      callIdx++;beep(700+callIdx*70,55);
      if(callIdx>=4){
        sc+=80;updHUD();setFb('1669 ✓','#00FF88');
        phase='call_done';setTimeout(startCPR,800);
      }
    } else {setFb('ผิด!','#FF2D55');beep(200,160);callIdx=0;}
  }
}

// ═══════════════════════════════════════════════════════
// CPR
// ═══════════════════════════════════════════════════════
function startCPR(){
  phase='cpr';compr=0;bwin=[];cbpm=0;cA=0;
  pumpState='up';pumpRefY=null;pumpExtreme=null;lastPumpT=0;cprDepth=0;
  strokeDepth=0;lastStrokeQ=0;
  setTag('SCENE 3 — CPR');setDots(2);
  postureEl.style.display='block';
  if(bodyMode){
    setMsg('🧍 คุกเข่าข้างผู้ป่วย ประสานมือ ก้มกดหน้าอก',
      'กดลงให้ลึก (ดูแถบความลึกขวาจอ) จังหวะ 100-120/นาที');
  } else {
    setMsg('🤲 ประสานมือซ้อนกัน แล้วกดลง-ปล่อยขึ้น ให้สุด',
      'ต้องกดลงให้ลึกพอ (ดูแถบความลึกขวาจอ) จังหวะ 100-120/นาที');
  }
}

function cprMotion(w,h){
  const B=bodyMode?Math.min(w,h)*.34:getB();
  const p=ptr();
  // body is horizontal (rotated 90°): chest sits offset toward head side (screen X)
  // body-local chest at Y=-0.40 → after rotate, horizontal offset on screen
  const chOff=(-(-0.40))*B*PERSP;  // toward head
  const cx=aX()+chOff*0.0+ B*0.0;  // keep near center; head offset small
  const cy=aY();
  const zR=bodyMode?B*.65:B*.5;
  inChest=false;

  if(demo){postureEl.className='good';postureEl.textContent='🎮 Demo — แตะจอ = ปั๊ม';}
  else if(clasped){postureEl.className='good';postureEl.textContent=bodyMode?'🧍 ก้มกดหน้าอกแรงๆ!':'🤲 ท่าถูกต้อง ✓ กดลง-ปล่อยขึ้นให้สุด!';}
  else if(h1&&h2){postureEl.className='';postureEl.textContent='🤲 เอามือมาประสานซ้อนกัน!';}
  else {postureEl.className='';postureEl.textContent='👀 ยกมือที่ประสานเข้ากล้อง';}

  if(p){
    const dx=p.x-cx,dy=p.y-cy;
    if(Math.hypot(dx,dy)<zR/0.7)inChest=true;
  }

  // ── Genuine compression detection with DEPTH tracking ──
  // STROKE_TARGET = ideal full-depth travel (like pressing 5-6cm on a manikin)
  const STROKE_MIN   = B*0.16;   // minimum to register a stroke at all
  const STROKE_TARGET= B*0.30;   // ideal depth → full depth meter
  if(inChest&&p&&(clasped||demo)){
    if(pumpRefY===null){ pumpRefY=p.y; pumpExtreme=p.y; }
    if(pumpState==='up'){
      if(p.y>pumpExtreme) pumpExtreme=p.y;        // moving down
      const trav=pumpExtreme-pumpRefY;
      strokeDepth=Math.max(0,Math.min(1,trav/STROKE_TARGET));   // live depth gauge
      cprDepth=strokeDepth;
      if(trav>=STROKE_MIN){
        pumpState='down'; lastStrokeQ=strokeDepth;
        pumpRefY=pumpExtreme; pumpExtreme=p.y;
      } else if(p.y<pumpRefY){ pumpRefY=p.y; }
    } else {
      if(p.y<pumpExtreme) pumpExtreme=p.y;        // moving up
      if(pumpRefY-pumpExtreme>=STROKE_MIN){
        pumpState='up'; pumpRefY=pumpExtreme; pumpExtreme=p.y;
        registerCompression();
      } else if(p.y>pumpRefY){ pumpRefY=p.y; }
    }
  } else {
    pumpRefY=null; pumpExtreme=null; strokeDepth=0;
    if(pumpState!=='up') pumpState='up';
  }
  cprDepth=Math.max(0,cprDepth-0.05);

  // Draw depth meter (right side of screen)
  drawDepthMeter(w,h);
}

function drawDepthMeter(w,h){
  const mx=w-34, my=h*.32, mh=h*.34, mw=14;
  // track
  G.fillStyle='rgba(0,0,0,.45)';
  G.fillRect(mx-mw/2,my,mw,mh);
  // target band (good depth zone, upper portion = deeper)
  const tTop=my+mh*0.08, tBot=my+mh*0.42;
  G.fillStyle='rgba(0,255,136,.25)';
  G.fillRect(mx-mw/2,tTop,mw,tBot-tTop);
  // current fill (from bottom up by depth)
  const lvl=(pumpState==='down'?lastStrokeQ:strokeDepth);
  const fillH=mh*Math.min(1,lvl);
  const col=lvl>=0.78?'#00FF88':lvl>=0.5?'#FFB300':'#FF6633';
  G.fillStyle=col;
  G.fillRect(mx-mw/2,my+mh-fillH,mw,fillH);
  // border
  G.strokeStyle='rgba(255,255,255,.3)';G.lineWidth=1.5;
  G.strokeRect(mx-mw/2,my,mw,mh);
  // label
  G.save();
  G.translate(mx+14,my+mh/2);G.rotate(Math.PI/2);
  G.font='bold 9px system-ui';G.fillStyle='rgba(255,255,255,.6)';
  G.textAlign='center';G.fillText('ความลึก',0,0);
  G.restore();
  // target arrow
  G.fillStyle='rgba(0,255,136,.7)';G.font='9px system-ui';G.textAlign='right';
  G.fillText('◄ ลึกพอ',mx-mw/2-2,tBot-4);
}

function registerCompression(){
  if(phase!=='cpr'||compr>=TOTAL)return;
  const now=Date.now();
  if(now-lastPumpT<260)return;   // debounce (max ~230 BPM)
  const hadPrev=lastPumpT>0;
  const iv=hadPrev?now-lastPumpT:545;
  lastPumpT=now;
  cA=1;

  // BPM measured from REAL interval between completed strokes
  let txt,col,hz,pts;
  if(!hadPrev){
    // first compression: no rate yet — neutral
    txt='เริ่ม!';col='#00E5A0';hz=700;pts=4;
    compr++; sc+=pts;
    beep(hz,55); setFb(txt,col); updHUD();
    if(navigator.vibrate)navigator.vibrate(28);
    return;
  }
  const inst=Math.round(60000/iv);
  bwin.push(inst); if(bwin.length>5)bwin.shift();
  cbpm=Math.round(bwin.reduce((a,c)=>a+c,0)/bwin.length);

  const goodForm=clasped||demo;
  const goodRate=cbpm>=100&&cbpm<=120;
  const okRate=cbpm>=95&&cbpm<=125;
  const goodDepth=demo||lastStrokeQ>=0.78;   // pressed deep enough
  const okDepth=demo||lastStrokeQ>=0.5;

  if(goodRate&&goodForm&&goodDepth){pts=12;txt='PERFECT!';col='#FFB300';hz=1050;}
  else if(okRate&&okDepth){pts=7;txt='GOOD';col='#00E5A0';hz=820;}
  else if(!okDepth){pts=3;txt='กดให้ลึกขึ้น!';col='#FF6633';hz=300;}
  else if(cbpm<95){pts=3;txt='เร็วขึ้น!';col='#FF9900';hz=360;}
  else{pts=3;txt='ช้าลง!';col='#FF9900';hz=360;}
  beep(hz,60);compr++;sc+=pts;
  setFb(txt,col);updHUD();
  if(navigator.vibrate)navigator.vibrate(goodDepth?40:20);
  if(compr>=TOTAL){
    phase='cpr_done';postureEl.style.display='none';
    setFb('✅ ครบ 30!','#00FF88');
    setMsg('CPR สำเร็จ! เตรียม AED','');
    setTimeout(startAED,1400);
  }
}

// ═══════════════════════════════════════════════════════
// AED — close-up torso diagram with 2 clearly-spaced pads
// ═══════════════════════════════════════════════════════
const AED_Z=[
  {id:'a0',label:'ใต้ไหปลาร้าขวา', nx:-.30, ny:-.34, ok:true},  // patient's right = screen left
  {id:'a1',label:'ชายโครงซ้าย',    nx: .30, ny: .24, ok:true},  // patient's left = screen right
  {id:'a2',label:'กลางอก',          nx: .02, ny:-.05, ok:false},
  {id:'a3',label:'หน้าท้อง',        nx:-.02, ny: .46, ok:false},
];

function startAED(){
  phase='aed';aedPlaced=new Set();aedArmed=false;
  setTag('SCENE 4 — AED');setDots(3);
  setMsg('⚡ แปะแผ่น AED 2 จุดให้ถูก','ค้างมือบนตำแหน่งที่ถูกต้อง: ใต้ไหปลาร้าขวา + ชายโครงซ้าย');
}

// big close-up torso centered on screen for clear pad selection
function aedTorso(w,h){
  const cx=w*.5, cy=h*.46;
  const tw=Math.min(w*.62, 300), th=tw*1.35;
  return {cx,cy,tw,th};
}

function drawAEDScene(w,h){
  const T=aedTorso(w,h);

  // ── draw close-up bare torso (front view, like AED trainer) ──
  G.save();
  // soft shadow
  const sh=G.createRadialGradient(T.cx,T.cy+T.th*.5,0,T.cx,T.cy+T.th*.5,T.tw*.7);
  sh.addColorStop(0,'rgba(0,0,0,.32)');sh.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=sh;
  G.beginPath();G.ellipse(T.cx,T.cy+T.th*.5,T.tw*.65,T.th*.14,0,0,Math.PI*2);G.fill();
  // neck
  const ng=G.createLinearGradient(T.cx,T.cy-T.th*.6,T.cx,T.cy-T.th*.4);
  ng.addColorStop(0,'#E0A87E');ng.addColorStop(1,'#F6C9A0');
  G.fillStyle=ng;G.fill(mkRR(T.cx-T.tw*.14,T.cy-T.th*.6,T.tw*.28,T.th*.16,T.tw*.06));
  // torso with skin gradient (rounded, shoulders wider at top)
  const tg=G.createLinearGradient(T.cx-T.tw*.42,0,T.cx+T.tw*.42,0);
  tg.addColorStop(0,'#E0A87E');tg.addColorStop(.5,'#F6C9A0');tg.addColorStop(1,'#E0A87E');
  G.fillStyle=tg;G.fill(mkRR(T.cx-T.tw*.42,T.cy-T.th*.44,T.tw*.84,T.th*.86,T.tw*.2));
  // top highlight
  G.globalAlpha=.25;
  const hg=G.createLinearGradient(T.cx,T.cy-T.th*.44,T.cx,T.cy-T.th*.1);
  hg.addColorStop(0,'#FFE0C0');hg.addColorStop(1,'rgba(255,224,192,0)');
  G.fillStyle=hg;G.fill(mkRR(T.cx-T.tw*.4,T.cy-T.th*.42,T.tw*.8,T.th*.4,T.tw*.18));
  G.globalAlpha=1;
  // pectorals
  G.globalAlpha=.12;G.fillStyle='#000';
  G.beginPath();G.ellipse(T.cx-T.tw*.19,T.cy-T.th*.16,T.tw*.17,T.tw*.14,0,0,Math.PI*2);G.fill();
  G.beginPath();G.ellipse(T.cx+T.tw*.19,T.cy-T.th*.16,T.tw*.17,T.tw*.14,0,0,Math.PI*2);G.fill();
  // abs hint
  G.globalAlpha=.08;
  for(let i=0;i<2;i++){
    fEl(T.cx-T.tw*.1,T.cy+T.th*.04+i*T.tw*.16,T.tw*.07,T.tw*.06,'#000');
    fEl(T.cx+T.tw*.1,T.cy+T.th*.04+i*T.tw*.16,T.tw*.07,T.tw*.06,'#000');
  }
  G.globalAlpha=1;
  // sternum line
  G.strokeStyle='rgba(120,80,55,.18)';G.lineWidth=2;
  G.beginPath();G.moveTo(T.cx,T.cy-T.th*.3);G.lineTo(T.cx,T.cy+T.th*.22);G.stroke();
  G.restore();

  // ── pad zones ──
  const zones=AED_Z.map(z=>({id:z.id,label:z.label,ok:z.ok,
    x:T.cx+z.nx*T.tw, y:T.cy+z.ny*T.th, r:Math.max(34,T.tw*.15)}));

  for(const z of zones){
    const placed=aedPlaced.has(z.id);
    const col=placed?(aedArmed?'#00FF88':'#FFB300'):'#00E5A0';
    // pad = rounded square (like real AED electrode)
    const active=dwellTarget===z.id;
    const pz=(Math.sin(Date.now()/450)+1)*.5;
    G.save();
    G.beginPath();
    const pr=z.r*.92;
    G.roundRect?G.roundRect(z.x-pr,z.y-pr,pr*2,pr*2,10):
      G.rect(z.x-pr,z.y-pr,pr*2,pr*2);
    G.fillStyle=placed?hexA(col,.28):hexA(col,.12);G.fill();
    G.strokeStyle=active?'#00FF88':hexA(col,.6+pz*.3);G.lineWidth=2.5;G.stroke();
    // dwell progress
    if(active&&dwellProg>0){
      G.beginPath();
      G.arc(z.x,z.y,z.r+8,-Math.PI/2,-Math.PI/2+dwellProg*Math.PI*2);
      G.strokeStyle='#00FF88';G.lineWidth=4;G.lineCap='round';G.stroke();G.lineCap='butt';
    }
    // icon + label
    G.textAlign='center';
    G.font=`${Math.round(z.r*.5)}px system-ui`;G.textBaseline='middle';
    G.fillStyle='#fff';G.fillText(placed?(aedArmed?'✓':'⚡'):'＋',z.x,z.y-z.r*.12);
    G.font='bold 10px system-ui';G.textBaseline='top';
    G.fillStyle=active?'#00FF88':'#fff';
    G.fillText(z.label,z.x,z.y+z.r*.42);
    G.textBaseline='alphabetic';
    G.restore();
  }

  if(aedArmed)return;
  const hit=updateDwell(zones);
  if(hit&&!aedPlaced.has(hit)){
    if(aedPlaced.size>=2)return;
    aedPlaced.add(hit);beep(660,50);
    if(navigator.vibrate)navigator.vibrate(25);
    if(aedPlaced.size===2){
      const ok=[...aedPlaced].every(id=>AED_Z.find(z=>z.id===id).ok);
      if(ok){
        aedArmed=true;sc+=180;updHUD();
        setFb('ถูกต้อง!','#00FF88');
        setMsg('✅ ห้ามสัมผัสผู้ป่วย!','ค้างมือบนปุ่ม SHOCK');
        phase='shock';beep(1050,100);
      } else {
        setFb('ผิดตำแหน่ง!','#FF2D55');beep(200,200);
        setTimeout(()=>{aedPlaced=new Set();},800);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════
function beep(hz=700,ms=70){
  try{
    if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(aCtx.state==='suspended')aCtx.resume();
    const o=aCtx.createOscillator(),g=aCtx.createGain();
    o.connect(g);g.connect(aCtx.destination);o.frequency.value=hz;
    g.gain.setValueAtTime(.1,aCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,aCtx.currentTime+ms/1000);
    o.start();o.stop(aCtx.currentTime+ms/1000);
  }catch(_){}
}

// ═══════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════
function loop(){draw();requestAnimationFrame(loop);}

function draw(){
  const w=cv.width,h=cv.height;
  G.clearRect(0,0,w,h);
  if(demo){G.fillStyle='#050A14';G.fillRect(0,0,w,h);drawGrid(w,h);}
  cA=Math.max(0,cA-.06);
  updDistF();

  if(phase==='scan'){scanLogic();drawScan(w,h);drawPointer();return;}
  if(phase==='pickspot'){drawPickSpot(w,h);return;}
  if(phase==='bodysetup'){bodySetupLogic();drawBodySetup(w,h);drawPointer();return;}
  if(phase==='mat'&&matStart){
    const t=Math.min(1,(Date.now()-matStart)/750);
    matScale=easeOutBack(t);
    if(t>=1){matScale=1;afterMat();}
  }
  if(!anchored){drawPointer();return;}

  // AED & shock use a dedicated close-up diagram, not the floor patient
  if(phase==='aed'||phase==='shock'){
    sceneLogic(w,h);
    drawPointer();
    return;
  }

  // Body mode: patient fixed at screen center (camera is propped, not gyro-anchored)
  if(bodyMode){
    drawPatient(w,h);
    sceneLogic(w,h);
    drawPointer();
    return;
  }

  if(patientOnScreen()){
    drawPatient(w,h);
    sceneLogic(w,h);
  } else {
    drawOffscreenHint(w,h);
  }
  drawPointer();
}

function drawBodySetup(w,h){
  const t=Date.now(),pu=(Math.sin(t/450)+1)*.5;
  // body outline guide in center
  G.strokeStyle=poseLms?`rgba(0,255,136,${.5+pu*.3})`:`rgba(255,179,0,${.4+pu*.3})`;
  G.lineWidth=2;G.setLineDash([10,8]);
  G.strokeRect(w*.2,h*.12,w*.6,h*.76);
  G.setLineDash([]);
  G.font='bold 15px system-ui';G.textAlign='center';
  G.fillStyle=poseLms?'#00FF88':'rgba(255,255,255,.7)';
  G.fillText(poseLms?'✓ พบตัวคุณแล้ว':'ถอยให้เห็นตัวเต็ม',w*.5,h*.5);
  if(poseLms) drawPointer();
}

// Off-screen indicator: บอกทิศที่ผู้ป่วยอยู่
function drawOffscreenHint(w,h){
  const y=aY();
  const above=y<0;   // patient projected above screen top → need to look more toward horizon (raise cam)
  const pu=(Math.sin(Date.now()/300)+1)*.5;
  G.font='bold 34px system-ui';G.textAlign='center';
  G.fillStyle=`rgba(0,229,160,${.5+pu*.4})`;
  G.fillText(above?'↑':'↓',w*.5,above?70:h-60);
  G.font='bold 14px system-ui';
  G.fillStyle='rgba(255,255,255,.8)';
  G.fillText(above?'ยกกล้องขึ้นเล็กน้อย — หาผู้ป่วย':'เอียงกล้องลง — ผู้ป่วยอยู่บนพื้น',
    w*.5,above?100:h-90);
}

// ═══════════════════════════════════════════════════════
// SCAN VISUAL
// ═══════════════════════════════════════════════════════
function drawPickSpot(w,h){
  const t=Date.now();
  // detected-floor wash
  const fg=G.createLinearGradient(0,h*.4,0,h);
  fg.addColorStop(0,'rgba(0,229,160,0)');
  fg.addColorStop(1,'rgba(0,229,160,.06)');
  G.fillStyle=fg;G.fillRect(0,h*.4,w,h*.6);

  const p=ptr();
  let near=null,nd=70;
  if(p){ for(const d of floorDots){const dist=Math.hypot(p.x-d.x,p.y-d.y);if(dist<nd){nd=dist;near=d;}} }

  floorDots.forEach((d,i)=>{
    const ph=(Math.sin(t/600+d.seed)+1)*.5;
    const isNear=near===d;
    const r=isNear?16:9+ph*2;
    // outer ring
    G.beginPath();G.ellipse(d.x,d.y,r,r*0.4,0,0,Math.PI*2);
    G.strokeStyle=isNear?`rgba(0,229,160,.9)`:`rgba(0,229,160,${.35+ph*.25})`;
    G.lineWidth=isNear?2.5:1.5;G.stroke();
    // center dot
    G.beginPath();G.ellipse(d.x,d.y,3,1.6,0,0,Math.PI*2);
    G.fillStyle=`rgba(0,229,160,${.6+ph*.3})`;G.fill();
    // ripple when near
    if(isNear){
      const rip=((t/700)%1);
      G.beginPath();G.ellipse(d.x,d.y,r+rip*22,(r+rip*22)*0.4,0,0,Math.PI*2);
      G.strokeStyle=`rgba(0,229,160,${(1-rip)*.5})`;G.lineWidth=1.5;G.stroke();
    }
  });

  // hint label near pointer
  if(p){
    G.font='bold 12px var(--thai),system-ui';G.textAlign='center';
    G.fillStyle='rgba(255,255,255,.9)';
    G.fillText(near?'แตะเพื่อวางตรงนี้':'เลื่อนมือไปที่จุดสีเขียว',p.x,p.y-26);
  }
  // hands-free: dwell over a dot to place it
  if(near){
    if(dwellTarget!=='spot'){dwellTarget='spot';dwellStart=t;}
    dwellProg=Math.min(1,(t-dwellStart)/DWELL_MS);
    // dwell ring
    G.beginPath();
    G.arc(near.x,near.y,22,-Math.PI/2,-Math.PI/2+dwellProg*Math.PI*2);
    G.strokeStyle='#00E5A0';G.lineWidth=3;G.lineCap='round';G.stroke();G.lineCap='butt';
    if(dwellProg>=1){dwellTarget=null;dwellProg=0;placeAt(near.x,near.y);}
  } else { if(dwellTarget==='spot'){dwellTarget=null;dwellProg=0;} }

  drawPointer();
}

function drawScan(w,h){
  const cx=w*.5,t=Date.now();
  // scan rings sit in the lower-centre where the floor would be
  const cy=h*.6;
  const prog=Math.min(1,scanAccum/SCAN_NEED);
  const Rx=Math.min(w,h)*.3,Ry=Rx*PERSP*.7;
  const valid=demo||!sensorOK||
    (beta>=FLOOR_BETA_MIN&&beta<=FLOOR_BETA_MAX&&moveRate<STEADY_MAX);
  for(let i=0;i<3;i++){
    const ph=((t/1100+i/3)%1);
    G.beginPath();
    G.ellipse(cx,cy,Rx*(.25+ph*.75),Ry*(.25+ph*.75),0,0,Math.PI*2);
    G.strokeStyle=valid?`rgba(0,255,136,${Math.max(0,1-ph)*.5})`
      :`rgba(255,179,0,${Math.max(0,1-ph)*.4})`;
    G.lineWidth=1.5;G.stroke();
  }
  G.beginPath();
  G.ellipse(cx,cy,Rx*.32,Ry*.32,0,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
  G.strokeStyle='#00FF88';G.lineWidth=4;G.lineCap='round';G.stroke();G.lineCap='butt';
  G.font='bold 16px system-ui';G.textAlign='center';
  G.fillStyle='rgba(255,255,255,.85)';
  G.fillText(Math.round(prog*100)+'%',cx,cy+6);

  if(sensorOK&&!demo){
    const gx2=w*.5,gy=h*.86,gw=Math.min(220,w*.6);
    G.fillStyle='rgba(255,255,255,.15)';G.fillRect(gx2-gw/2,gy,gw,4);
    const minP=FLOOR_BETA_MIN/180,maxP=FLOOR_BETA_MAX/180;
    G.fillStyle='rgba(0,255,136,.3)';
    G.fillRect(gx2-gw/2+gw*minP,gy,gw*(maxP-minP),4);
    const bp=Math.max(0,Math.min(1,(beta||0)/180));
    G.fillStyle=valid?'#00FF88':'#FFB300';
    G.beginPath();G.arc(gx2-gw/2+gw*bp,gy+2,7,0,Math.PI*2);G.fill();
    G.font='10px system-ui';G.fillStyle='rgba(255,255,255,.5)';
    G.fillText('มุมเอียงเครื่อง',gx2,gy+24);
  }
}

function drawGrid(w,h){
  const vpx=w*.5,vpy=h*.2,fy=h*.9;
  G.strokeStyle='rgba(0,229,160,.04)';G.lineWidth=1;
  for(let i=0;i<=8;i++){
    const x=w*(i/8);
    G.beginPath();G.moveTo(vpx+(x-vpx)*.25,vpy+(fy-vpy)*.25);G.lineTo(x,fy);G.stroke();
  }
  [.35,.52,.68,.82].forEach(t=>{
    const y=vpy+(fy-vpy)*t;
    G.beginPath();G.moveTo(0,y);G.lineTo(w,y);G.stroke();
  });
}

// ═══════════════════════════════════════════════════════
// POINTER
// ═══════════════════════════════════════════════════════
function drawPointer(){
  const t=Date.now(),pu=(Math.sin(t/300)+1)*.5;

  // Full-body mode: draw pose skeleton
  if(bodyMode&&poseLms){
    const W=cv.width,H=cv.height;
    const P=i=>poseLms[i]&&poseLms[i].visibility>.3?{x:poseLms[i].x*W,y:poseLms[i].y*H}:null;
    const bones=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
    G.strokeStyle=clasped?'rgba(0,255,136,.5)':'rgba(0,229,160,.45)';G.lineWidth=3;
    for(const [a,b] of bones){
      const pa=P(a),pb=P(b);
      if(pa&&pb){G.beginPath();G.moveTo(pa.x,pa.y);G.lineTo(pb.x,pb.y);G.stroke();}
    }
    // joints
    for(const i of [11,12,13,14,15,16,23,24]){
      const p=P(i);if(!p)continue;
      G.beginPath();G.arc(p.x,p.y,5,0,Math.PI*2);
      G.fillStyle='rgba(0,229,160,.7)';G.fill();
    }
    // highlight clasped hands
    if(h1){
      G.beginPath();G.arc(h1.x,h1.y,18,0,Math.PI*2);
      G.strokeStyle=clasped?`rgba(0,255,136,${.7+pu*.3})`:`rgba(255,179,0,${.6+pu*.3})`;
      G.lineWidth=3;G.stroke();
    }
    return;
  }

  if(h1&&h2){
    G.beginPath();G.moveTo(h1.x,h1.y);G.lineTo(h2.x,h2.y);
    G.strokeStyle=clasped?'rgba(0,255,136,.5)':'rgba(255,179,0,.35)';
    G.lineWidth=clasped?2.5:1.5;
    if(!clasped)G.setLineDash([5,5]);
    G.stroke();G.setLineDash([]);
  }
  for(const hd of [h1,h2]){
    if(!hd)continue;
    G.beginPath();G.arc(hd.x,hd.y,15,0,Math.PI*2);
    G.strokeStyle=clasped?`rgba(0,255,136,${.6+pu*.3})`:`rgba(0,229,160,${.55+pu*.3})`;
    G.lineWidth=2;G.stroke();
    G.beginPath();G.arc(hd.x,hd.y,3,0,Math.PI*2);
    G.fillStyle=clasped?'#00FF88':'#00E5A0';G.fill();
  }
  if(!h1&&demo&&demoX!=null){
    G.beginPath();G.arc(demoX,demoY,15,0,Math.PI*2);
    G.strokeStyle=`rgba(0,229,160,${.55+pu*.3})`;G.lineWidth=2;G.stroke();
    G.beginPath();G.arc(demoX,demoY,3,0,Math.PI*2);
    G.fillStyle='#00E5A0';G.fill();
  }
}

// ═══════════════════════════════════════════════════════
// PATIENT — drawn at ground-projected position
// ═══════════════════════════════════════════════════════
function getB(){return Math.min(cv.width,cv.height)*.26*distF;}
function getS(){return getB()*matScale;}

function drawPatient(w,h){
  const B=bodyMode? Math.min(w,h)*.34*matScale : getB();
  const dp=cA*B*.044;
  const AXX=aX(),AYY=aY();
  const persp=bodyMode?0.62:PERSP;   // less squash in body mode (side view)
  G.save();
  G.translate(AXX,AYY);
  G.rotate(Math.PI/2);  // นอนขวาง: หุ่นนอนแนวนอนทุกโหมด
  if(matScale<1){
    const burst=1-matScale;
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2,r=B*burst*.9;
      G.beginPath();G.arc(Math.cos(a)*r,Math.sin(a)*r*persp,3,0,Math.PI*2);
      G.fillStyle=`rgba(0,229,160,${burst*.8})`;G.fill();
    }
  }
  G.scale(matScale,matScale);
  G.scale(1,persp);
  // shift body so the CHEST (body-Y ≈ -0.40) sits at the anchor origin,
  // aligning the illustration's chest with the CPR target ring
  G.translate(0, 0.40*B);

  // soft ground shadow (radial, feathered)
  const sh=G.createRadialGradient(0,B*.05,0,0,B*.05,B*1.5);
  sh.addColorStop(0,'rgba(0,0,0,.34)');
  sh.addColorStop(.7,'rgba(0,0,0,.18)');
  sh.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=sh;
  G.beginPath();G.ellipse(0,B*.1,B*.7,B*1.78,0,0,Math.PI*2);G.fill();
  G.globalAlpha=1;

  // ───────────────────────────────────────────────
  // PATIENT — supine, polished illustration
  // head far (-Y), feet near (+Y); chest at body-Y ≈ -0.40
  // ───────────────────────────────────────────────
  const SKIN='#F6C9A0', SKINSH='#E0A87E', SKINHI='#FFE0C0';
  const HAIR='#3A2616', HAIRHI='#5A3D24';
  const SHIRT='#3D6FB8', SHIRTSH='#2B4F88', SHIRTHI='#5A8AD4';
  const PANTS='#34425E', PANTSSH='#222C42';

  // helper: vertical gradient rounded-rect (along body axis)
  const gradRR=(x,y,ww,hh,r,cTop,cBot)=>{
    const g=G.createLinearGradient(x,y,x+ww,y);
    g.addColorStop(0,cTop);g.addColorStop(1,cBot);
    G.fillStyle=g;G.fill(mkRR(x,y,ww,hh,r));
  };

  // ---- LEGS (toward camera) ----
  gradRR(-B*.345,B*.40,B*.32,B*.92,B*.15,PANTSSH,PANTS);
  gradRR( B*.025,B*.40,B*.32,B*.92,B*.15,PANTS,PANTSSH);
  // knee highlights
  G.globalAlpha=.12;fEl(-B*.18,B*.66,B*.14,B*.16,'#fff');
  fEl( B*.18,B*.66,B*.14,B*.16,'#fff');G.globalAlpha=1;
  // ankles (skin)
  fEl(-B*.18,B*1.22,B*.10,B*.13,SKINSH);
  fEl( B*.18,B*1.22,B*.10,B*.13,SKINSH);
  // SHOES
  const shoeG=G.createLinearGradient(0,B*1.28,0,B*1.55);
  shoeG.addColorStop(0,'#2A3242');shoeG.addColorStop(1,'#11151E');
  G.fillStyle=shoeG;G.fill(mkRR(-B*.27,B*1.30,B*.20,B*.26,B*.09));
  G.fillStyle=shoeG;G.fill(mkRR( B*.07,B*1.30,B*.20,B*.26,B*.09));
  G.globalAlpha=.22;fEl(-B*.17,B*1.36,B*.07,B*.05,'#fff');
  fEl( B*.17,B*1.36,B*.07,B*.05,'#fff');G.globalAlpha=1;

  // ---- HIPS ----
  gradRR(-B*.37,B*.06,B*.74,B*.40,B*.13,PANTSSH,PANTS);

  // ---- TORSO / SHIRT ----
  const tg=G.createLinearGradient(-B*.4,0,B*.4,0);
  tg.addColorStop(0,SHIRTSH);tg.addColorStop(.5,SHIRT);tg.addColorStop(1,SHIRTSH);
  G.fillStyle=tg;G.fill(mkRR(-B*.4,-B*.86+dp,B*.80,B*1.0,B*.16));
  // chest highlight ridge
  G.globalAlpha=.14;
  G.fillStyle=SHIRTHI;G.fill(mkRR(-B*.12,-B*.82+dp,B*.24,B*.9,B*.08));
  G.globalAlpha=1;
  // collar
  G.fillStyle=SHIRTSH;
  G.beginPath();G.moveTo(-B*.16,-B*.86+dp);G.lineTo(0,-B*.72+dp);
  G.lineTo(B*.16,-B*.86+dp);G.closePath();G.fill();
  // subtle fabric fold lines
  G.globalAlpha=.08;G.strokeStyle='#000';G.lineWidth=B*.02;
  G.beginPath();G.moveTo(-B*.22,-B*.5+dp);G.lineTo(-B*.1,-B*.2+dp);
  G.moveTo(B*.22,-B*.5+dp);G.lineTo(B*.1,-B*.2+dp);G.stroke();
  G.globalAlpha=1;

  // ---- SHOULDERS ----
  gradRR(-B*.46,-B*1.12,B*.92,B*.34,B*.16,SHIRTSH,SHIRT);

  // ---- ARMS at sides ----
  // upper arm (sleeve)
  gradRR(-B*.62,-B*1.06,B*.22,B*.5,B*.10,SHIRTSH,SHIRT);
  gradRR( B*.40,-B*1.06,B*.22,B*.5,B*.10,SHIRT,SHIRTSH);
  // forearm (skin)
  gradRR(-B*.63,-B*.58,B*.18,B*.62,B*.09,SKINSH,SKIN);
  gradRR( B*.45,-B*.58,B*.18,B*.62,B*.09,SKIN,SKINSH);
  // hands
  fEl(-B*.54,B*.10,B*.11,B*.14,SKIN);
  fEl( B*.54,B*.10,B*.11,B*.14,SKIN);
  G.globalAlpha=.5;fEl(-B*.54,B*.07,B*.08,B*.06,SKINHI);
  fEl( B*.54,B*.07,B*.08,B*.06,SKINHI);G.globalAlpha=1;

  // ---- NECK ----
  gradRR(-B*.11,-B*1.22,B*.22,B*.16,B*.06,SKINSH,SKIN);

  // ---- HEAD (far end) ----
  // face
  const fg=G.createRadialGradient(-B*.06,-B*1.4,B*.04,0,-B*1.36,B*.34);
  fg.addColorStop(0,SKINHI);fg.addColorStop(.6,SKIN);fg.addColorStop(1,SKINSH);
  G.fillStyle=fg;
  G.beginPath();G.ellipse(0,-B*1.38,B*.25,B*.30,0,0,Math.PI*2);G.fill();
  // ears
  fEl(-B*.24,-B*1.38,B*.06,B*.09,SKINSH);
  fEl( B*.24,-B*1.38,B*.06,B*.09,SKINSH);
  // hair (top crown)
  const hg=G.createLinearGradient(0,-B*1.7,0,-B*1.4);
  hg.addColorStop(0,HAIR);hg.addColorStop(1,HAIRHI);
  G.fillStyle=hg;
  G.beginPath();G.ellipse(0,-B*1.54,B*.27,B*.22,0,Math.PI,0);G.fill();
  G.beginPath();G.ellipse(0,-B*1.46,B*.26,B*.16,0,Math.PI*1.05,Math.PI*1.95);G.fill();
  // closed eyes (unconscious)
  G.strokeStyle='rgba(90,60,45,.7)';G.lineWidth=Math.max(1.4,B*.018);
  G.beginPath();G.arc(-B*.09,-B*1.37,B*.05,0.15,Math.PI-0.15);G.stroke();
  G.beginPath();G.arc( B*.09,-B*1.37,B*.05,0.15,Math.PI-0.15);G.stroke();
  // brows
  G.strokeStyle='rgba(70,45,30,.5)';G.lineWidth=Math.max(1.2,B*.014);
  G.beginPath();G.arc(-B*.09,-B*1.42,B*.05,Math.PI+0.3,Math.PI*2-0.3);G.stroke();
  G.beginPath();G.arc( B*.09,-B*1.42,B*.05,Math.PI+0.3,Math.PI*2-0.3);G.stroke();
  // nose
  G.strokeStyle='rgba(180,130,100,.5)';G.lineWidth=Math.max(1.2,B*.015);
  G.beginPath();G.moveTo(0,-B*1.34);G.lineTo(-B*.02,-B*1.28);G.stroke();
  // mouth (slightly open - unconscious)
  G.fillStyle='rgba(120,70,60,.4)';
  G.beginPath();G.ellipse(0,-B*1.24,B*.05,B*.025,0,0,Math.PI*2);G.fill();

  // Danger pulse around head (safety scenes)
  if(['safety0','safety1','safety2','mat'].includes(phase)){
    const pu=(Math.sin(Date.now()/400)+1)*.5;
    G.globalAlpha=.55*pu;G.strokeStyle='#FF2D55';G.lineWidth=2.2;
    G.beginPath();G.ellipse(0,-B*1.38,B*.4+B*.08*pu,B*.46+B*.1*pu,0,0,Math.PI*2);G.stroke();
    G.globalAlpha=1;
  }
  G.restore();

  if(phase==='cpr')drawChestTarget(B,dp);
}

function drawChestTarget(B,dp){
  const bm=bodyMode;
  // horizontal body in all modes → round target at patient center
  const Rx=bm?B*.42:B*matScale*.40, Ry=Rx;
  const cx=aX(), cy=aY();
  const p=(Math.sin(Date.now()/430)+1)*.5;
  const act=inChest&&(clasped||demo);
  const [r,g,b]=act?[0,255,136]:[255,179,0];
  const gr=G.createRadialGradient(cx,cy,0,cx,cy,Rx*2);
  gr.addColorStop(0,`rgba(${r},${g},${b},${.12+p*.07})`);
  gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
  G.beginPath();G.ellipse(cx,cy,Rx*2,Ry*2,0,0,Math.PI*2);
  G.fillStyle=gr;G.fill();
  G.beginPath();G.ellipse(cx,cy,Rx,Ry,0,0,Math.PI*2);
  G.strokeStyle=`rgba(${r},${g},${b},${.52+p*.38})`;G.lineWidth=2.5;
  G.setLineDash([8,5]);G.stroke();G.setLineDash([]);
  G.beginPath();G.ellipse(cx,cy,Rx*.15,Ry*.15,0,0,Math.PI*2);
  G.fillStyle=`rgba(${r},${g},${b},${.7+p*.25})`;G.fill();
  G.font=`bold ${Math.max(11,Math.round(Rx*.2))}px system-ui`;
  G.fillStyle=`rgba(${r},${g},${b},${.85+p*.1})`;
  G.textAlign='center';G.textBaseline='top';
  const label=!inChest?'เอามือมาวางที่นี่':!clasped&&!demo?'ประสานมือซ้อนกัน!':
    pumpState==='down'?'ปล่อยขึ้น!':'กดลงให้สุด!';
  G.fillText(label,cx,cy+Ry*1.25);
  G.textBaseline='alphabetic';
  if(cA>.04){
    G.beginPath();G.ellipse(cx,cy,Rx*(1-cA*.18),Ry*(1-cA*.18),0,0,Math.PI*2);
    G.strokeStyle=`rgba(255,255,255,${cA*.55})`;G.lineWidth=3.5;G.stroke();
  }
  const mp=((Date.now()%545)/545),mo=Math.max(0,1-mp*1.4);
  G.beginPath();G.ellipse(cx,cy,Rx*(.3+mp*.7),Ry*(.3+mp*.7),0,0,Math.PI*2);
  G.strokeStyle=`rgba(255,255,255,${mo*.35})`;G.lineWidth=1.5;G.stroke();
}

// HELPERS
// ═══════════════════════════════════════════════════════
function easeOutBack(t){const c1=1.70158,c3=c1+1;
  return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}
function mkRR(x,y,w,h,r){
  const R=Math.min(r,w/2,h/2),p=new Path2D();
  p.moveTo(x+R,y);p.arcTo(x+w,y,x+w,y+h,R);p.arcTo(x+w,y+h,x,y+h,R);
  p.arcTo(x,y+h,x,y,R);p.arcTo(x,y,x+w,y,R);p.closePath();return p;}
function fRR(x,y,w,h,r,c){G.fillStyle=c;G.fill(mkRR(x,y,w,h,r));}
function sRR(x,y,w,h,r,c,lw){G.strokeStyle=c;G.lineWidth=lw;G.stroke(mkRR(x,y,w,h,r));}
function fEl(x,y,rx,ry,c){G.beginPath();G.ellipse(x,y,rx,ry,0,0,Math.PI*2);
  G.fillStyle=c;G.fill();}
</script>
